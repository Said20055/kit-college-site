# Обратный прокси и TLS-терминатор сайта ГБПОУ РД «КИТ».
# Замените kit-college.ru на реальный домен и пропишите пути к сертификатам.

# ── HTTP → HTTPS (с проходом для ACME http-01) ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kit-college.ru www.kit-college.ru;

    # Выпуск/продление сертификатов Let's Encrypt (certbot webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kit-college.ru www.kit-college.ru;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS задаётся здесь (TLS-терминация); остальные security-заголовки
    # приходят от приложения (next.config.ts) и проксируются как есть.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Размер загружаемых файлов (MAX_UPLOAD_BYTES = 25 МБ + запас).
    client_max_body_size 30m;

    # Сжатие текстовых ответов.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    # Не раскрываем версию nginx.
    server_tokens off;

    # Статика Next с длинным кэшем (иммутабельные хэшированные ассеты).
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
