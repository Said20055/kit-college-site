# Продакшен-стек сайта ГБПОУ РД «КИТ» — собственный сервер в РФ (152-ФЗ).
# Порядок развёртывания см. в docs/DEPLOY.md.
#
#   db      — PostgreSQL (том с данными, публикуется только на 127.0.0.1)
#   migrate — однократное применение миграций (prisma migrate deploy)
#   web     — Next.js standalone-сервер (внутренний порт 3000)
#   nginx   — TLS-терминатор и обратный прокси (80/443)

services:
  db:
    image: postgres:16
    container_name: kit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kit-db-data:/var/lib/postgresql/data
    # Только localhost: нужно для сборки web (пререндер) и резервного копирования.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      target: migrator
    image: kit-college-migrate:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
      # Сборка пререндерит страницы, читающие БД, поэтому build-контейнеру нужна
      # сеть хоста, чтобы достучаться до опубликованной db на 127.0.0.1:5432.
      network: host
      args:
        DATABASE_URL: ${BUILD_DATABASE_URL}
    image: kit-college-web:latest
    container_name: kit-web
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_DIR: /app/var/uploads
      NODE_ENV: production
    volumes:
      - kit-uploads:/app/var/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  nginx:
    image: nginx:1.27-alpine
    container_name: kit-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/kit.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./deploy/nginx/acme:/var/www/acme:ro

volumes:
  kit-db-data:
  kit-uploads:
